name: Publish MyWallpaper release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    concurrency:
      group: mywallpaper-release-${{ github.repository_id }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    uses: MyWallpapers/native-addon-toolchain/.github/workflows/native-addon-build.yml@380cf6e8ce47616a5310ba4de802dbf872ed22e6
    with:
      channel: development
